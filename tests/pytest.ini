[pytest]
# pytest 配置文件

# 测试文件模式
python_files = test_*.py *_test.py

# 测试类模式
python_classes = Test*

# 测试函数模式
python_functions = test_*

# 最小版本
minversion = 7.0

# 命令行选项
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    github: 需要 GitHub API 的测试
    ai: 需要 AI 功能的测试

# 测试路径
testpaths = .

# 异步测试模式
asyncio_mode = auto

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置（可选，需要安装 pytest-cov）
# addopts = --cov=. --cov-report=html --cov-report=term