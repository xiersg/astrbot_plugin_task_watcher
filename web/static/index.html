<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>TaskWatcher 任务书</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="top">
    <h1>项目任务书</h1>
    <p class="meta" id="meta"></p>
  </header>
  <!-- 与 #app 分离：加载时改写 main 不会删掉提示区，避免脚本报错 -->
  <section class="notice notice-below-top" id="notice">
    请在地址栏带上只读令牌（完整链接由机器人 <code>/watcher web</code> 返回）。<br />
    若在飞书打不开，多半是服务器仍监听 <code>127.0.0.1</code>：请在插件配置将 <code>web_server_host</code> 改为 <code>0.0.0.0</code>，并填写 <code>web_public_base_url</code> 为外网可访问地址，详见 README。
  </section>
  <div class="shell">
    <aside id="sidebar" class="sidebar is-hidden" aria-hidden="true">
      <div class="sidebar-inner">
        <label class="sr-only" for="search">搜索任务书与目录</label>
        <input
          type="search"
          id="search"
          class="search-input"
          placeholder="筛选目录与卡片…"
          autocomplete="off"
          spellcheck="false"
        />
        <nav class="toc" id="toc" aria-label="目录"></nav>
      </div>
    </aside>
    <div class="main-column">
      <main id="app"></main>
    </div>
  </div>
  <footer class="foot">TaskWatcher · 数据由机器人后端从 Gist 拉取</footer>
  <script src="/static/js-yaml.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
