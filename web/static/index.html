<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TaskWatcher 任务书</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="top">
    <h1>项目任务书</h1>
    <p class="meta" id="meta"></p>
  </header>
  <div class="shell">
    <div id="toolbar" class="toolbar is-hidden" aria-hidden="true">
      <div class="toolbar-row">
        <label class="sr-only" for="search">搜索任务书</label>
        <input
          type="search"
          id="search"
          class="search-input"
          placeholder="搜索标题、条目、路径、贡献、完成情况…"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <nav class="toc" id="toc" aria-label="目录"></nav>
    </div>
  <main id="app">
    <section class="notice" id="notice">
      请在地址栏带上只读令牌，例如：<code>http://127.0.0.1:端口/?token=你的令牌</code><br />
      在 AstrBot 中对机器人发送 <code>/watcher web</code> 可得到带令牌的完整链接。
    </section>
  </main>
  </div>
  <footer class="foot">TaskWatcher · 数据由机器人后端从 Gist 拉取</footer>
  <script src="/static/app.js"></script>
</body>
</html>
